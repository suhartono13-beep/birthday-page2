<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>老哥，启动！🚀</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0a0a0a; /* 酷炫深色背景 */
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            color: white;
        }

        /* 赛博朋克网格背景 */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: perspective(500px) rotateX(60deg);
            bottom: -50%;
            z-index: 1;
            animation: gridMove 2s linear infinite;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 0 30px; }
        }

        .main-ui {
            z-index: 10;
            text-align: center;
            width: 90%;
        }

        .title-zone h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--neon-blue);
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        /* 模拟技能槽 */
        .skill-slots {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .buff-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--neon-blue);
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            overflow: hidden;
        }

        .buff-btn:active {
            transform: scale(0.95);
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        .buff-btn::after {
            content: "CLICK";
            position: absolute;
            right: 10px;
            font-size: 0.6rem;
            opacity: 0.5;
        }

        /* 惊喜弹窗 */
        #popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 80%;
            max-width: 320px;
            background: #1a1a1a;
            border: 3px solid var(--neon-pink);
            padding: 30px 20px;
            border-radius: 20px;
            z-index: 100;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.5);
        }

        #popup.active { transform: translate(-50%, -50%) scale(1); }

        .popup-title { color: var(--neon-pink); font-weight: bold; margin-bottom: 15px; font-size: 1.4rem;}
        .popup-body { line-height: 1.6; font-size: 1rem; color: #ccc;}

        .close-btn {
            margin-top: 20px;
            background: var(--neon-pink);
            border: none;
            padding: 8px 25px;
            color: white;
            border-radius: 5px;
            font-weight: bold;
        }

        /* 音乐光柱动画 */
        .music-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 3px;
            height: 20px;
            align-items: flex-end;
            cursor: pointer;
            z-index: 100;
        }
        .bar { width: 3px; background: var(--neon-green); animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { height: 5px; } to { height: 20px; } }
    </style>
</head>
<body>

    <div class="main-ui">
        <div class="title-zone">
            <h1>Level Up! 30+</h1>
            <div class="subtitle">表哥·年度旗舰版</div>
        </div>

        <div class="skill-slots">
            <button class="buff-btn" onclick="showBuff('career')">⚡ 事业：开启狂暴模式</button>
            <button class="buff-btn" onclick="showBuff('family')">❤️ 家庭：满血回复BUFF</button>
            <button class="buff-btn" onclick="showBuff('wealth')">💎 财富：触发掉宝暴击</button>
            <button class="buff-btn" onclick="showBuff('free')">🕹️ 自由：强制挂机休假</button>
        </div>
    </div>

    <div id="popup">
        <div class="popup-title" id="p-title"></div>
        <div class="popup-body" id="p-body"></div>
        <button class="close-btn" onclick="closePopup()">收下Buff</button>
    </div>

    <div class="music-bar" onclick="toggleMusic()">
        <div class="bar" style="animation-delay: 0.1s"></div>
        <div class="bar" style="animation-delay: 0.3s"></div>
        <div class="bar" style="animation-delay: 0.2s"></div>
        <span style="font-size: 12px; margin-left: 5px;">BGM</span>
    </div>

    <audio id="music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
    </audio>

    <script>
        const buffs = {
            career: {
                t: "系统提示：高升！",
                b: "检测到表哥当前才华溢出，老板看你眼神都带光！今年项目稳如老狗，职位原地起飞。去战斗吧，MVP！"
            },
            family: {
                t: "后方支援：稳固！",
                b: "神兽（娃）今天格外听话，嫂子支持力度+100%。你是家里的超级英雄，今天卸下盔甲，你是被全家宠爱的那个！"
            },
            wealth: {
                t: "财运：金光闪闪！",
                b: "不管是股市还是年终，统统触发暴击奖励！存款数字涨得比你娃的身高还快，买心仪的大玩具再也不用看脸色！"
            },
            free: {
                t: "自由：限时开启！",
                b: "系统强制清空工作群消息！今天你不是谁的员工，也不是谁的爸爸/老公，你只是你自己。游戏走起，快乐万岁！"
            }
        };

        function showBuff(type) {
            document.getElementById('p-title').innerText = buffs[type].t;
            document.getElementById('p-body').innerText = buffs[type].b;
            document.getElementById('popup').classList.add('active');
            
            // 手机震动
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function closePopup() {
            document.getElementById('popup').classList.remove('active');
        }

        function toggleMusic() {
            const m = document.getElementById('music');
            m.paused ? m.play() : m.pause();
        }
    </script>
</body>
</html>
